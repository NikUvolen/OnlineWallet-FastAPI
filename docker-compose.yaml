services:
  app:
    build: .
    container_name: wallet_app
    restart: "on-failure:3"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - app/.env
    environment:
      POSTGRES_HOST: db
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wallet_user}:${POSTGRES_PASSWORD:-wallet_password}@db:5432/${POSTGRES_DB:-wallet_db}
      TEST_POSTGRES_DB: wallet_test_db
      TEST_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wallet_user}:${POSTGRES_PASSWORD:-wallet_password}@db:5432/wallet_test_db
    ports:
      - "8000:8000"

  db:
    image: postgres:15-alpine
    container_name: wallet_db
    restart: always
    env_file:
      - app/.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wallet_user} -d ${POSTGRES_DB:-wallet_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: wallet_pgadmin
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - app/.env
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
